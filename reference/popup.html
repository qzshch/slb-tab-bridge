<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 380px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; background: #1a1a2e; color: #e0e0e0; }
.header { padding: 12px 16px; background: #16213e; border-bottom: 1px solid #0f3460; }
.header h1 { font-size: 14px; font-weight: 600; color: #e94560; }
.stats { display: flex; gap: 16px; margin-top: 8px; }
.stat { font-size: 12px; color: #a0a0a0; }
.stat b { color: #e94560; font-size: 16px; }
.actions { padding: 10px 16px; display: flex; gap: 8px; border-bottom: 1px solid #0f3460; }
.btn { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; transition: 0.2s; }
.btn-danger { background: #e94560; color: white; }
.btn-danger:hover { background: #c73652; }
.btn-primary { background: #0f3460; color: #53d8fb; border: 1px solid #53d8fb40; }
.btn-primary:hover { background: #1a4a7a; }
.btn-secondary { background: #2a2a4a; color: #a0a0a0; }
.btn-secondary:hover { background: #3a3a5a; }
.device-list { max-height: 400px; overflow-y: auto; padding: 8px; }
.device-group { margin-bottom: 6px; border-radius: 6px; background: #16213e; overflow: hidden; }
.device-header { display: flex; align-items: center; padding: 8px 12px; cursor: pointer; gap: 8px; }
.device-header:hover { background: #1a2a4e; }
.device-ip { font-weight: 600; color: #53d8fb; font-family: 'Cascadia Code', monospace; font-size: 12px; }
.device-count { font-size: 11px; color: #666; margin-left: auto; }
.device-tabs { padding: 0 12px 6px; display: none; }
.device-tabs.show { display: block; }
.tab-item { display: flex; align-items: center; padding: 4px 0; gap: 6px; font-size: 11px; color: #999; }
.tab-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tab-item .close-tab { cursor: pointer; color: #666; font-size: 14px; padding: 0 4px; }
.tab-item .close-tab:hover { color: #e94560; }
.empty { text-align: center; padding: 40px 16px; color: #666; }
.filter-bar { padding: 8px 16px; border-bottom: 1px solid #0f3460; }
.filter-bar input { width: 100%; padding: 6px 10px; border-radius: 4px; border: 1px solid #0f3460; background: #0d1b2a; color: #e0e0e0; font-size: 12px; outline: none; }
.filter-bar input:focus { border-color: #53d8fb; }
.checkbox { width: 14px; height: 14px; accent-color: #e94560; }
</style>
</head>
<body>
<div class="header">
  <h1>Device Tab Manager</h1>
  <div class="stats">
    <div class="stat"><b id="deviceCount">0</b> 设备标签</div>
    <div class="stat"><b id="ipCount">0</b> 台设备</div>
    <div class="stat"><b id="totalCount">0</b> 总标签</div>
  </div>
</div>
<div class="actions">
  <button class="btn btn-danger" id="closeAll">关闭全部设备标签</button>
  <button class="btn btn-primary" id="groupAll">归组</button>
  <button class="btn btn-secondary" id="refresh">刷新</button>
</div>
<div class="filter-bar">
  <input type="text" id="filterInput" placeholder="过滤 IP 或标题...">
</div>
<div class="device-list" id="deviceList"></div>
<script src="popup.js"></script>
</body>
</html>
