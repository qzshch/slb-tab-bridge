<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 360px; font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; background: #1a1a2e; color: #e0e0e0; }
.header { padding: 12px 16px; background: #16213e; border-bottom: 1px solid #0f3460; }
.header h1 { font-size: 14px; font-weight: 600; }
.status { display: flex; align-items: center; gap: 6px; margin-top: 6px; font-size: 12px; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.dot.on { background: #4caf50; }
.dot.off { background: #e94560; }
.stats { display: flex; gap: 12px; margin-top: 8px; }
.stat { font-size: 12px; color: #888; }
.stat b { color: #53d8fb; font-size: 15px; }
.actions { padding: 10px 16px; display: flex; gap: 8px; border-bottom: 1px solid #0f3460; }
.btn { flex: 1; padding: 7px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 500; }
.btn-danger { background: #e94560; color: #fff; }
.btn-danger:hover { background: #c73652; }
.btn-primary { background: #0f3460; color: #53d8fb; border: 1px solid #53d8fb40; }
.btn-primary:hover { background: #1a4a7a; }
.btn-sm { background: #2a2a4a; color: #888; }
.btn-sm:hover { background: #3a3a5a; }
.list { max-height: 380px; overflow-y: auto; padding: 6px 8px; }
.group { margin-bottom: 4px; border-radius: 5px; background: #16213e; overflow: hidden; }
.gh { display: flex; align-items: center; padding: 7px 10px; cursor: pointer; gap: 6px; }
.gh:hover { background: #1a2a4e; }
.ip { font-weight: 600; color: #53d8fb; font-family: monospace; font-size: 12px; }
.cnt { font-size: 11px; color: #555; margin-left: auto; }
.tl { padding: 0 10px 4px; display: none; }
.tl.show { display: block; }
.ti { display: flex; align-items: center; padding: 3px 0; gap: 5px; font-size: 11px; color: #888; }
.ti .t { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ti .x { cursor: pointer; color: #555; font-size: 13px; }
.ti .x:hover { color: #e94560; }
.empty { text-align: center; padding: 30px; color: #555; }
.cb { width: 13px; height: 13px; accent-color: #e94560; }
.filter { padding: 6px 16px; border-bottom: 1px solid #0f3460; }
.filter input { width: 100%; padding: 5px 8px; border-radius: 4px; border: 1px solid #0f3460; background: #0d1b2a; color: #e0e0e0; font-size: 12px; outline: none; }
.filter input:focus { border-color: #53d8fb; }
</style>
</head>
<body>
<div class="header">
  <h1>Tab Bridge</h1>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">检测中...</span>
  </div>
  <div class="stats">
    <div class="stat"><b id="devN">0</b> 设备</div>
    <div class="stat"><b id="ipN">0</b> IP</div>
    <div class="stat"><b id="allN">0</b> 全部</div>
  </div>
</div>
<div class="actions">
  <button class="btn btn-danger" id="closeAll">关闭全部设备</button>
  <button class="btn btn-primary" id="groupAll">归组</button>
  <button class="btn btn-sm" id="refresh">刷新</button>
</div>
<div class="filter"><input id="fi" placeholder="过滤 IP 或标题..."></div>
<div class="list" id="list"></div>
<script src="popup.js"></script>
</body>
</html>
